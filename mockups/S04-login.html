<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>イケメンデート — ログイン</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: { 50: '#e0f7fa', 500: '#00c1d4', 600: '#00a3b3' },
            gray: { 50: '#f5f8fa', 100: '#edf0f3', 200: '#d8dde3', 400: '#a0aab4', 500: '#7a8fa6', 900: '#1a1a2e' },
            error: { 50: '#fee2e2', 500: '#ef4444' }
          },
          fontFamily: { sans: ['Noto Sans JP', 'Inter', 'sans-serif'] }
        }
      }
    }
  </script>
</head>
<body class="bg-gray-50 text-gray-900 font-sans min-h-screen">

  <header class="bg-white border-b border-gray-200">
    <div class="max-w-md mx-auto px-4 h-14 flex items-center justify-center">
      <span class="text-primary-500 font-bold text-lg">イケメンデート</span>
    </div>
  </header>

  <main class="max-w-md mx-auto px-4 py-10">
    <h1 class="text-2xl font-bold text-gray-900 mb-2">ログイン</h1>
    <p class="text-gray-500 text-sm mb-8">おかえりなさい</p>

    <!-- Error Banner -->
    <div class="bg-error-50 border border-red-200 rounded-md px-4 py-3 mb-6 flex items-start gap-3">
      <svg class="w-4 h-4 text-error-500 mt-0.5 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20">
        <path fill-rule="evenodd" d="M18 10a8 8 0 1 1-16 0 8 8 0 0 1 16 0Zm-8-5a.75.75 0 0 1 .75.75v4.5a.75.75 0 0 1-1.5 0v-4.5A.75.75 0 0 1 10 5Zm0 10a1 1 0 1 0 0-2 1 1 0 0 0 0 2Z" clip-rule="evenodd"/>
      </svg>
      <p class="text-sm text-error-500">メールアドレスまたはパスワードが正しくありません</p>
    </div>

    <form class="space-y-6">

      <div>
        <label class="block text-sm font-semibold text-gray-900 mb-2">メールアドレス</label>
        <input type="email" value="yamada.hana@gmail.com"
               class="w-full border border-gray-200 rounded-md px-4 py-3 text-base bg-white focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-transparent">
      </div>

      <div>
        <label class="block text-sm font-semibold text-gray-900 mb-2">パスワード</label>
        <div class="relative">
          <input type="password" value="wrongpass"
                 class="w-full border border-red-300 rounded-md px-4 py-3 text-base bg-white focus:outline-none focus:ring-2 focus:ring-error-500 focus:border-transparent pr-12">
          <button type="button" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178Z"/>
              <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z"/>
            </svg>
          </button>
        </div>
        <div class="mt-2 text-right">
          <a href="S05-pw-reset-input.html" class="text-xs text-gray-500 hover:text-primary-500 transition-colors">
            パスワードをお忘れの方はこちら
          </a>
        </div>
      </div>

      <button type="submit"
              class="w-full bg-primary-500 hover:bg-primary-600 text-white font-semibold rounded-full py-4 text-base transition-colors shadow-sm">
        ログイン
      </button>

    </form>

    <p class="text-center mt-6 text-sm text-gray-500">
      アカウントをお持ちでない方は
      <a href="S02-register.html" class="text-primary-500 font-semibold">新規登録</a>
    </p>
  </main>

</body>
</html>
