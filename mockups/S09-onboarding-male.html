<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>イケメンデート — プロフィール登録（男性）Step 1</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: { 50: '#e0f7fa', 500: '#00c1d4', 600: '#00a3b3' },
            gray: { 50: '#f5f8fa', 100: '#edf0f3', 200: '#d8dde3', 400: '#a0aab4', 500: '#7a8fa6', 900: '#1a1a2e' },
            error: { 500: '#ef4444' }
          },
          fontFamily: { sans: ['Noto Sans JP', 'Inter', 'sans-serif'] }
        }
      }
    }
  </script>
</head>
<body class="bg-gray-50 text-gray-900 font-sans min-h-screen flex flex-col">

  <header class="bg-white border-b border-gray-200 flex-shrink-0">
    <div class="max-w-md mx-auto px-4 h-14 flex items-center justify-center">
      <span class="text-primary-500 font-bold text-lg">イケメンデート</span>
    </div>
  </header>

  <main class="max-w-md mx-auto w-full px-4 py-10 flex flex-col flex-1">

    <!-- Progress -->
    <div class="mb-8">
      <div class="flex items-center justify-between mb-2">
        <span class="text-xs text-gray-500 font-semibold">ステップ 1 / 7</span>
        <span class="text-xs text-gray-400">プロフィール画像</span>
      </div>
      <div class="flex gap-1">
        <div class="h-1 flex-1 rounded-full bg-primary-500"></div>
        <div class="h-1 flex-1 rounded-full bg-gray-200"></div>
        <div class="h-1 flex-1 rounded-full bg-gray-200"></div>
        <div class="h-1 flex-1 rounded-full bg-gray-200"></div>
        <div class="h-1 flex-1 rounded-full bg-gray-200"></div>
        <div class="h-1 flex-1 rounded-full bg-gray-200"></div>
        <div class="h-1 flex-1 rounded-full bg-gray-200"></div>
      </div>
    </div>

    <div class="flex-1 flex flex-col">
      <h1 class="text-2xl font-bold text-gray-900 mb-1">プロフィール画像を設定してください</h1>
      <p class="text-gray-500 text-sm mb-10">女性ユーザーに最初に見られる写真です。必須項目です。</p>

      <div class="flex flex-col items-center gap-6 flex-1">

        <!-- Upload button -->
        <button type="button"
                class="w-44 h-44 rounded-full bg-white border-2 border-dashed border-primary-500 flex flex-col items-center justify-center gap-2 hover:bg-primary-50 transition-colors shadow-sm">
          <svg class="w-10 h-10 text-primary-500" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6.827 6.175A2.31 2.31 0 0 1 5.186 7.23c-.38.054-.757.112-1.134.175C2.999 7.58 2.25 8.507 2.25 9.574V18a2.25 2.25 0 0 0 2.25 2.25h15A2.25 2.25 0 0 0 21.75 18V9.574c0-1.067-.75-1.994-1.802-2.169a47.865 47.865 0 0 0-1.134-.175 2.31 2.31 0 0 1-1.64-1.055l-.822-1.316a2.192 2.192 0 0 0-1.736-1.039 48.774 48.774 0 0 0-5.232 0 2.192 2.192 0 0 0-1.736 1.039l-.821 1.316Z"/>
            <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 12.75a4.5 4.5 0 1 1-9 0 4.5 4.5 0 0 1 9 0ZM18.75 10.5h.008v.008h-.008V10.5Z"/>
          </svg>
          <span class="text-sm text-primary-500 font-semibold">写真を選ぶ</span>
        </button>

        <!-- Selected state (reference) -->
        <div class="bg-gray-100 rounded-2xl p-4 w-full text-center">
          <p class="text-xs text-gray-400 font-semibold mb-3">【画像選択後の表示例】</p>
          <div class="flex justify-center">
            <div class="relative">
              <div class="w-36 h-36 rounded-full overflow-hidden border-2 border-primary-500 shadow-sm">
                <img src="../public/sawayakasports.png" alt="プレビュー" class="w-full h-full object-cover object-top">
              </div>
              <button type="button" class="absolute -bottom-1 -right-1 w-9 h-9 bg-primary-500 rounded-full flex items-center justify-center shadow-md">
                <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M16.862 4.487l1.687-1.688a1.875 1.875 0 1 1 2.652 2.652L6.832 19.82a4.5 4.5 0 0 1-1.897 1.13l-2.685.8.8-2.685a4.5 4.5 0 0 1 1.13-1.897L16.863 4.487Zm0 0L19.5 7.125"/>
                </svg>
              </button>
            </div>
          </div>
        </div>

        <!-- Error state -->
        <div class="w-full">
          <p class="text-xs text-error-500 text-center">プロフィール画像は必須です</p>
        </div>

        <p class="text-xs text-gray-400 text-center">JPEG / PNG / WEBP・10MB以下</p>
      </div>
    </div>

    <div class="mt-10">
      <a href="S09-onboarding-male-step2.html"
         class="block w-full bg-primary-500 hover:bg-primary-600 text-white font-semibold rounded-full py-4 text-base transition-colors shadow-sm text-center">
        次へ
      </a>
    </div>

  </main>
</body>
</html>
