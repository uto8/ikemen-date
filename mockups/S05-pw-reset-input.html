<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>イケメンデート — パスワードリセット</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: { 50: '#e0f7fa', 500: '#00c1d4', 600: '#00a3b3' },
            gray: { 50: '#f5f8fa', 200: '#d8dde3', 400: '#a0aab4', 500: '#7a8fa6', 900: '#1a1a2e' }
          },
          fontFamily: { sans: ['Noto Sans JP', 'Inter', 'sans-serif'] }
        }
      }
    }
  </script>
</head>
<body class="bg-gray-50 text-gray-900 font-sans min-h-screen">

  <header class="bg-white border-b border-gray-200">
    <div class="max-w-md mx-auto px-4 h-14 flex items-center gap-3">
      <a href="S04-login.html" class="text-gray-500 hover:text-gray-900 transition-colors">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5 8.25 12l7.5-7.5"/>
        </svg>
      </a>
      <span class="text-primary-500 font-bold text-lg">イケメンデート</span>
    </div>
  </header>

  <main class="max-w-md mx-auto px-4 py-10">
    <h1 class="text-2xl font-bold text-gray-900 mb-2">パスワードをリセットする</h1>
    <p class="text-gray-500 text-sm leading-relaxed mb-8">
      登録済みのメールアドレスを入力してください。<br>
      パスワードリセット用のリンクをお送りします。
    </p>

    <form class="space-y-6">
      <div>
        <label class="block text-sm font-semibold text-gray-900 mb-2">メールアドレス</label>
        <input type="email" placeholder="example@mail.com"
               class="w-full border border-gray-200 rounded-md px-4 py-3 text-base bg-white focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-transparent placeholder-gray-400">
      </div>

      <button type="submit"
              class="w-full bg-primary-500 hover:bg-primary-600 text-white font-semibold rounded-full py-4 text-base transition-colors shadow-sm">
        リセットメールを送信する
      </button>
    </form>

    <p class="text-center mt-6">
      <a href="S04-login.html" class="text-sm text-gray-500 hover:text-primary-500 transition-colors">
        ← ログインに戻る
      </a>
    </p>
  </main>

</body>
</html>
