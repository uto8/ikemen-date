<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>イケメンデート — マイページ</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: { 50: '#e0f7fa', 100: '#b2ebf2', 500: '#00c1d4', 600: '#00a3b3' },
            gray: { 50: '#f5f8fa', 100: '#edf0f3', 200: '#d8dde3', 400: '#a0aab4', 500: '#7a8fa6', 900: '#1a1a2e' },
            error: { 500: '#ef4444' }
          },
          fontFamily: { sans: ['Noto Sans JP', 'Inter', 'sans-serif'] }
        }
      }
    }
  </script>
</head>
<body class="bg-gray-50 text-gray-900 font-sans pb-20">

  <header class="bg-white border-b border-gray-200 sticky top-0 z-10">
    <div class="max-w-2xl mx-auto px-4 h-14 flex items-center">
      <h1 class="font-bold text-gray-900">マイページ</h1>
    </div>
  </header>

  <main class="max-w-2xl mx-auto px-4 py-6 space-y-5">

    <!-- Profile Card -->
    <div class="bg-white rounded-2xl shadow-sm p-6">
      <div class="flex items-center gap-4 mb-5">
        <div class="w-20 h-20 rounded-full overflow-hidden bg-gray-100 flex-shrink-0">
          <img src="../public/kawaii.png" alt="はな" class="w-full h-full object-cover object-top">
        </div>
        <div>
          <p class="text-xl font-bold text-gray-900">はな</p>
          <p class="text-sm text-gray-500 mt-1">22歳 · 東京都</p>
        </div>
      </div>

      <!-- Info rows (female profile — simple) -->
      <div class="space-y-3 text-sm">
        <div class="flex justify-between items-center py-2 border-b border-gray-100">
          <span class="text-gray-500">年齢</span>
          <span class="text-gray-900 font-semibold">22歳</span>
        </div>
        <div class="flex justify-between items-center py-2 border-b border-gray-100">
          <span class="text-gray-500">居住地</span>
          <span class="text-gray-900 font-semibold">東京都</span>
        </div>
        <div class="flex justify-between items-center py-2">
          <span class="text-gray-500">メールアドレス</span>
          <span class="text-gray-900 font-semibold text-right">yamada.hana@gmail.com</span>
        </div>
      </div>
    </div>

    <!-- Male profile Card (reference) -->
    <div class="bg-gray-50 border border-gray-200 rounded-2xl p-5">
      <p class="text-xs text-gray-400 font-semibold mb-4">【男性プロフィールの表示例】</p>
      <div class="bg-white rounded-xl p-4 space-y-3 text-sm">
        <div class="flex justify-between py-1.5 border-b border-gray-100">
          <span class="text-gray-500">職業</span>
          <span class="font-semibold">ソフトウェアエンジニア</span>
        </div>
        <div class="flex justify-between py-1.5 border-b border-gray-100">
          <span class="text-gray-500">身長</span>
          <span class="font-semibold">178cm</span>
        </div>
        <div class="py-1.5 border-b border-gray-100">
          <p class="text-gray-500 mb-2">自己紹介</p>
          <p class="text-gray-900 text-sm leading-relaxed">はじめまして！東京でエンジニアをしています。休日はカフェ巡りが趣味です。</p>
        </div>
        <div class="py-1.5">
          <p class="text-gray-500 mb-2">イケメンタイプ</p>
          <div class="flex flex-wrap gap-2">
            <span class="bg-primary-50 text-primary-500 text-xs font-semibold px-3 py-1 rounded-full border border-primary-100">爽やかスポーツ系</span>
            <span class="bg-primary-50 text-primary-500 text-xs font-semibold px-3 py-1 rounded-full border border-primary-100">かわいい系</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Actions -->
    <div class="space-y-3">
      <button class="w-full border-2 border-gray-200 text-gray-700 font-semibold rounded-full py-3.5 text-sm hover:border-gray-300 transition-colors bg-white">
        ログアウト
      </button>

      <div class="text-center pt-2">
        <button class="text-sm text-error-500 hover:underline">退会する</button>
      </div>
    </div>

    <!-- Logout confirm modal reference -->
    <div class="bg-gray-50 border border-gray-200 rounded-2xl p-5">
      <p class="text-xs text-gray-400 font-semibold mb-3">【ログアウト確認ダイアログの例】</p>
      <div class="bg-white rounded-xl p-5 shadow-sm">
        <p class="font-bold text-gray-900 mb-2 text-center">ログアウトしますか？</p>
        <div class="flex gap-3 mt-4">
          <button class="flex-1 border border-gray-200 rounded-full py-2.5 text-sm text-gray-500">キャンセル</button>
          <button class="flex-1 bg-primary-500 text-white rounded-full py-2.5 text-sm font-semibold">ログアウト</button>
        </div>
      </div>
    </div>

    <!-- Withdraw confirm modal reference -->
    <div class="bg-gray-50 border border-gray-200 rounded-2xl p-5">
      <p class="text-xs text-gray-400 font-semibold mb-3">【退会確認ダイアログの例】</p>
      <div class="bg-white rounded-xl p-5 shadow-sm">
        <p class="font-bold text-gray-900 mb-2 text-center">退会しますか？</p>
        <p class="text-xs text-gray-500 text-center leading-relaxed mb-4">退会すると元に戻せません。<br>プロフィールといいねは即時削除されます。</p>
        <div class="flex gap-3">
          <button class="flex-1 border border-gray-200 rounded-full py-2.5 text-sm text-gray-500">キャンセル</button>
          <button class="flex-1 bg-error-500 text-white rounded-full py-2.5 text-sm font-semibold">退会する</button>
        </div>
      </div>
    </div>

  </main>

  <!-- Bottom Nav -->
  <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 z-10">
    <div class="max-w-2xl mx-auto flex">
      <a href="S10-gallery.html" class="flex-1 flex flex-col items-center justify-center py-3 gap-1 text-gray-400">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6A2.25 2.25 0 0 1 6 3.75h2.25A2.25 2.25 0 0 1 10.5 6v2.25a2.25 2.25 0 0 1-2.25 2.25H6a2.25 2.25 0 0 1-2.25-2.25V6ZM3.75 15.75A2.25 2.25 0 0 1 6 13.5h2.25a2.25 2.25 0 0 1 2.25 2.25V18a2.25 2.25 0 0 1-2.25 2.25H6A2.25 2.25 0 0 1 3.75 18v-2.25ZM13.5 6a2.25 2.25 0 0 1 2.25-2.25H18A2.25 2.25 0 0 1 20.25 6v2.25A2.25 2.25 0 0 1 18 10.5h-2.25a2.25 2.25 0 0 1-2.25-2.25V6ZM13.5 15.75a2.25 2.25 0 0 1 2.25-2.25H18a2.25 2.25 0 0 1 2.25 2.25V18A2.25 2.25 0 0 1 18 20.25h-2.25A2.25 2.25 0 0 1 13.5 18v-2.25Z"/></svg>
        <span class="text-xs">一覧</span>
      </a>
      <a href="S12-likes-received.html" class="flex-1 flex flex-col items-center justify-center py-3 gap-1 text-gray-400">
        <div class="relative">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M21 8.25c0-2.485-2.099-4.5-4.688-4.5-1.935 0-3.597 1.126-4.312 2.733-.715-1.607-2.377-2.733-4.313-2.733C5.1 3.75 3 5.765 3 8.25c0 7.22 9 12 9 12s9-4.78 9-12Z"/></svg>
          <span class="absolute -top-1 -right-1 min-w-[18px] h-[18px] bg-red-500 text-white text-[10px] font-bold rounded-full flex items-center justify-center px-1 leading-none">3</span>
        </div>
        <span class="text-xs">いいね</span>
      </a>
      <a href="S13-matches.html" class="flex-1 flex flex-col items-center justify-center py-3 gap-1 text-gray-400">
        <div class="relative">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M8.625 12a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Zm0 0H8.25m4.125 0a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Zm0 0H12m4.125 0a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Zm0 0h-.375M21 12c0 4.556-4.03 8.25-9 8.25a9.764 9.764 0 0 1-2.555-.337A5.972 5.972 0 0 1 5.41 20.97a5.969 5.969 0 0 1-.474-.065 4.48 4.48 0 0 0 .978-2.025c.09-.457-.133-.901-.467-1.226C3.93 16.178 3 14.189 3 12c0-4.556 4.03-8.25 9-8.25s9 3.694 9 8.25Z"/></svg>
          <span class="absolute -top-1 -right-1 min-w-[18px] h-[18px] bg-red-500 text-white text-[10px] font-bold rounded-full flex items-center justify-center px-1 leading-none">1</span>
        </div>
        <span class="text-xs">マッチング</span>
      </a>
      <a href="S15-mypage.html" class="flex-1 flex flex-col items-center justify-center py-3 gap-1 text-primary-500">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632Z"/></svg>
        <span class="text-xs font-semibold">マイページ</span>

    </div>
  </nav>

</body>
</html>
