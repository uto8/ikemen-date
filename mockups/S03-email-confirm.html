<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>イケメンデート — メール確認待ち</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: { 50: '#e0f7fa', 500: '#00c1d4', 600: '#00a3b3' },
            gray: { 50: '#f5f8fa', 100: '#edf0f3', 200: '#d8dde3', 400: '#a0aab4', 500: '#7a8fa6', 900: '#1a1a2e' }
          },
          fontFamily: { sans: ['Noto Sans JP', 'Inter', 'sans-serif'] }
        }
      }
    }
  </script>
</head>
<body class="bg-gray-50 text-gray-900 font-sans min-h-screen">

  <header class="bg-white border-b border-gray-200">
    <div class="max-w-md mx-auto px-4 h-14 flex items-center justify-center">
      <span class="text-primary-500 font-bold text-lg">イケメンデート</span>
    </div>
  </header>

  <main class="max-w-md mx-auto px-4 py-16 text-center">

    <!-- Icon -->
    <div class="w-20 h-20 bg-primary-50 rounded-full flex items-center justify-center mx-auto mb-8">
      <svg class="w-10 h-10 text-primary-500" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M21.75 6.75v10.5a2.25 2.25 0 0 1-2.25 2.25h-15a2.25 2.25 0 0 1-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0 0 19.5 4.5h-15a2.25 2.25 0 0 0-2.25 2.25m19.5 0v.243a2.25 2.25 0 0 1-1.07 1.916l-7.5 4.615a2.25 2.25 0 0 1-2.36 0L3.32 8.91a2.25 2.25 0 0 1-1.07-1.916V6.75"/>
      </svg>
    </div>

    <h1 class="text-2xl font-bold text-gray-900 mb-3">確認メールを送りました</h1>
    <p class="text-gray-500 text-sm leading-relaxed mb-2">以下のアドレスに確認メールを送信しました。</p>
    <p class="text-primary-500 font-semibold text-sm mb-6">yamada.hana@gmail.com</p>
    <p class="text-gray-500 text-sm leading-relaxed mb-10">
      メール内のリンクをクリックして<br>メールアドレスの確認を完了してください。
    </p>

    <!-- Resend Button (Normal state) -->
    <div class="mb-6">
      <button class="w-full border-2 border-primary-500 text-primary-500 font-semibold rounded-full py-3.5 text-sm hover:bg-primary-50 transition-colors">
        確認メールを再送信する
      </button>
    </div>

    <!-- Cooldown state (shown as comment / secondary example) -->
    <div class="bg-gray-100 rounded-2xl p-5 mb-8 text-left">
      <p class="text-xs text-gray-500 font-semibold mb-2">【再送信クールダウン中の表示例】</p>
      <button disabled class="w-full border-2 border-gray-200 text-gray-400 font-semibold rounded-full py-3.5 text-sm bg-gray-50 cursor-not-allowed">
        あと 42 秒後に再送信できます
      </button>
    </div>

    <a href="S04-login.html" class="text-sm text-gray-500 hover:text-primary-500 transition-colors">
      ← ログイン画面に戻る
    </a>

  </main>

</body>
</html>
