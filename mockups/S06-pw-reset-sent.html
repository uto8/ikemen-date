<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>イケメンデート — リセットメール送信完了</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: { 50: '#e0f7fa', 500: '#00c1d4', 600: '#00a3b3' },
            gray: { 50: '#f5f8fa', 200: '#d8dde3', 500: '#7a8fa6', 900: '#1a1a2e' }
          },
          fontFamily: { sans: ['Noto Sans JP', 'Inter', 'sans-serif'] }
        }
      }
    }
  </script>
</head>
<body class="bg-gray-50 text-gray-900 font-sans min-h-screen">

  <header class="bg-white border-b border-gray-200">
    <div class="max-w-md mx-auto px-4 h-14 flex items-center justify-center">
      <span class="text-primary-500 font-bold text-lg">イケメンデート</span>
    </div>
  </header>

  <main class="max-w-md mx-auto px-4 py-20 text-center">

    <div class="w-20 h-20 bg-primary-50 rounded-full flex items-center justify-center mx-auto mb-8">
      <svg class="w-10 h-10 text-primary-500" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75 11.25 15 15 9.75M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z"/>
      </svg>
    </div>

    <h1 class="text-2xl font-bold text-gray-900 mb-4">リセットメールを送信しました</h1>
    <p class="text-gray-500 text-sm leading-relaxed mb-10">
      メール内のリンクをクリックして<br>新しいパスワードを設定してください。<br>
      <span class="text-xs text-gray-400 mt-2 block">リンクの有効期限は1時間です。</span>
    </p>

    <a href="S04-login.html"
       class="inline-block border-2 border-primary-500 text-primary-500 font-semibold rounded-full px-8 py-3.5 text-sm hover:bg-primary-50 transition-colors">
      ログインに戻る
    </a>

  </main>

</body>
</html>
